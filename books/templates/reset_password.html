<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
</head>
<body>

<h2>Reset Password</h2>

<input type="hidden" id="token" value="{{ token }}">

<input type="password" id="password" placeholder="New Password">
<br><br>

<button onclick="resetPassword()">Reset Password</button>

<p id="message"></p>

<script>
async function resetPassword() {
    const token = document.getElementById("token").value;
    const password = document.getElementById("password").value;

    const response = await fetch("http://127.0.0.1:8000/api/password_reset/confirm/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            token: token,
            password: password
        })
    });

    const data = await response.json();

    if (response.ok) {
        document.getElementById("message").innerText = "Password reset successful!";
    } else {
        document.getElementById("message").innerText = JSON.stringify(data);
    }
}
</script>

</body>
</html>
