<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: 80px auto;
      padding: 20px;
    }
    h2 {
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
      font-size: 15px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #4F46E5;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 15px;
      cursor: pointer;
    }
    button:hover {
      background: #4338CA;
    }
    #message {
      margin-top: 15px;
      font-size: 14px;
    }
    .success { color: green; }
    .error   { color: red;   }
  </style>
</head>
<body>
  <h2>Reset Your Password</h2>

  <input type="password" id="password" placeholder="New password" required />
  <input type="password" id="confirm" placeholder="Confirm new password" required />
  <button onclick="resetPassword()">Reset Password</button>

  <p id="message"></p>

  <script>
    function getTokenFromURL() {
      const pathParts = window.location.pathname.split('/');
      // URL: /api/reset-password/<token>/
      // pathParts: ['', 'api', 'reset-password', '<token>', '']
      return pathParts[pathParts.length - 2];
    }

    async function resetPassword() {
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const msg      = document.getElementById('message');

      if (!password) {
        msg.className = 'error';
        msg.textContent = 'Please enter a new password.';
        return;
      }

      if (password !== confirm) {
        msg.className = 'error';
        msg.textContent = 'Passwords do not match.';
        return;
      }

      const token = getTokenFromURL();

      try {
        const res = await fetch('https://newapi-jgbv.onrender.com/api/password-reset/confirm/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });

        const data = await res.json();

        if (res.ok) {
          msg.className   = 'success';
          msg.textContent = 'Password reset successful! You can now log in.';
        } else {
          msg.className   = 'error';
          msg.textContent = data.detail || data.password?.[0] || JSON.stringify(data);
        }

      } catch (err) {
        msg.className   = 'error';
        msg.textContent = 'Network error: ' + err.message;
      }
    }
  </script>
</body>
</html>
