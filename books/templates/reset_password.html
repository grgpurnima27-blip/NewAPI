<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: 80px auto;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4F46E5;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #4338CA;
    }

    #message {
      margin-top: 15px;
    }

    .success { color: green; }
    .error { color: red; }
  </style>
</head>

<body>
  <h2>Reset Password</h2>

  <input type="password" id="password" placeholder="New password" />
  <input type="password" id="confirm" placeholder="Confirm password" />

  <button onclick="resetPassword()">Reset Password</button>

  <p id="message"></p>

  <script>
    function getParams() {
      const parts = window.location.pathname.split('/');
      // /reset-password/<uidb64>/<token>/
      return {
        uidb64: parts[parts.length - 3],
        token: parts[parts.length - 2]
      };
    }

    async function resetPassword() {
      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;
      const msg = document.getElementById("message");

      if (!password || !confirm) {
        msg.className = "error";
        msg.textContent = "All fields are required";
        return;
      }

      if (password !== confirm) {
        msg.className = "error";
        msg.textContent = "Passwords do not match";
        return;
      }

      const { uidb64, token } = getParams();

      try {
        const res = await fetch(
          "https://newapi-jgbv.onrender.com/api/password-reset/confirm/",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ uidb64, token, password })
          }
        );

        const data = await res.json();

        if (res.ok) {
          msg.className = "success";
          msg.textContent = "Password reset successful!";
        } else {
          msg.className = "error";
          msg.textContent = data.error || "Something went wrong";
        }
      } catch (err) {
        msg.className = "error";
        msg.textContent = "Network error: " + err.message;
      }
    }
  </script>
</body>
</html>
